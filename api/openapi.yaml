openapi: "3.0.0"
info:
  title: litebans-api
  version: "1.0.0"
  description: |
    LiteBans REST API — описание для фронтенда.

    Базовый префикс всех путей: `/api/v1`. Это read-only API (нет методов на создание/изменение данных).

    Введены три уровня доступа: **аноним** (`/public/*`), **игрок** (`/player/*`, требует JWT) и
    **модератор** (`/mod/*`, требует JWT + право `web.litebans.view.all`).

    ## Общие положения

    - Все временные метки (`issuedAt`, `expiresAt`, `at`, `before`/`after`) — Unix-время в **миллисекундах**.
    - `reason`/`removed.reason` приходят уже очищенными от цветовых кодов Minecraft (`§x`, `&x`, `#RRGGBB`).
    - uuid принимается и в виде с тире, и без — но в ответах сервис всегда возвращает канонический вид с тире, в нижнем регистре.
    - Все списочные эндпоинты используют **офсетную** пагинацию (`page`/`pageSize`) и возвращают `PunishmentList`.
    - Авторизация — заголовком `Authorization: Bearer <JWT>`. JWT выпускается Identity Service (RS256), проверяются `iss` и `exp`; uuid игрока берётся из `sub`.
    - Списочные эндпоинты без `{type}` в пути (`/player/punishments/me`, `/mod/punishments`) возвращают вперемешку все 4 типа наказаний, различать по полю `type` в `Punishment`.
    - Для доступа к одному наказанию по id есть три параллельных эндпоинта — `/public/punishments/{type}/{id}`,
      `/player/punishments/{type}/{id}`, `/mod/punishments/{type}/{id}` — отличаются только тем, какие записи видны вызывающему.

tags:
  - name: Public
    description: Анонимные read-only эндпоинты наказаний (без авторизации).
  - name: Player
    description: Наказания текущего авторизованного игрока (требует JWT).
  - name: Moderation
    description: Полные списки наказаний по всем игрокам (требует право модератора).

paths:
  /api/litebans/v1/public/punishments:
    get:
      operationId: GetPublicPunishments
      tags:
        - Public
      summary: Список активных банов
      description: |
        Без авторизации. Всегда возвращает только активные (не тихие) баны — без параметра `type`,
        `active` или `silent`: они здесь не настраиваются.

        ```
        GET /api/v1/public/punishments?page=1&pageSize=20
        ```
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/public/punishments/stats:
    get:
      operationId: GetPublicPunishmentsStats
      tags:
        - Public
      summary: Агрегированные счётчики наказаний
      description: Глобальная статистика по наказаниям, без авторизации и без параметров.
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/public/lookup:
    get:
      operationId: GetPublicLookup
      tags:
        - Public
      summary: Резолвинг игрока/модератора по имени или uuid
      description: Резолвинг uuid↔имя по истории имён, без авторизации.
      parameters:
        - name: name
          in: query
          description: "Имя игрока, 1–16 символов `[A-Za-z0-9_]`. Передаётся ровно один из параметров: `name`, `uuid`, `moderatorName`, `moderatorUuid`."
          schema:
            type: string
        - name: uuid
          in: query
          description: "UUID игрока. Передаётся ровно один из параметров: `name`, `uuid`, `moderatorName`, `moderatorUuid`."
          schema:
            type: string
        - name: moderatorName
          in: query
          description: "Имя модератора (тот же формат, что у `name`). Передаётся ровно один из параметров: `name`, `uuid`, `moderatorName`, `moderatorUuid`."
          schema:
            type: string
        - name: moderatorUuid
          in: query
          description: "UUID модератора. Передаётся ровно один из параметров: `name`, `uuid`, `moderatorName`, `moderatorUuid`."
          schema:
            type: string
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Совпадений по переданному имени/uuid не найдено.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/public/punishments/{type}/{id}:
    get:
      operationId: GetPublicPunishmentByID
      tags:
        - Public
      summary: Получение одного наказания по типу и id (только активные баны)
      description: |
        Без авторизации. Отдаёт запись только если это бан **и** он сейчас активен — во всех
        остальных случаях (иной тип, снятый/истёкший бан) отвечает `404`, тем же кодом, что и при
        отсутствии записи.
      security: []
      parameters:
        - $ref: "#/components/parameters/TypePath"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Punishment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Запись не найдена, либо не является активным баном.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/me:
    get:
      operationId: GetPlayerPunishmentsMe
      tags:
        - Player
      summary: Наказания текущего игрока (все типы)
      description: Наказания текущего игрока, идентифицируемого по JWT (без отдельного параметра для uuid игрока).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Before"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/me/ban:
    get:
      operationId: GetPlayerPunishmentsMeBan
      tags:
        - Player
      summary: Баны текущего игрока
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Before"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/me/mute:
    get:
      operationId: GetPlayerPunishmentsMeMute
      tags:
        - Player
      summary: Муты текущего игрока
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Before"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/me/warning:
    get:
      operationId: GetPlayerPunishmentsMeWarning
      tags:
        - Player
      summary: Предупреждения текущего игрока
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Before"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/me/kick:
    get:
      operationId: GetPlayerPunishmentsMeKick
      tags:
        - Player
      summary: Кики текущего игрока
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Before"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/player/punishments/{type}/{id}:
    get:
      operationId: GetPlayerPunishmentByID
      tags:
        - Player
      summary: Получение одного наказания по типу и id (свои наказания + все активные баны)
      description: |
        Требует JWT. Отдаёт запись, если она принадлежит вызывающему игроку (uuid совпадает с
        `sub` из токена) — любого типа, — либо если это активный бан (независимо от владельца).
        Во всех остальных случаях — `404`, тем же кодом, что и при отсутствии записи.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TypePath"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Punishment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Запись не найдена, либо принадлежит другому игроку и не является активным баном.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/litebans/v1/mod/punishments:
    get:
      operationId: GetModPunishments
      tags:
        - Moderation
      summary: Полный список наказаний по всем игрокам и модераторам (все типы)
      description: Требует право `web.litebans.view.all`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Active"
        - $ref: "#/components/parameters/Silent"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/mod/punishments/ban:
    get:
      operationId: GetModPunishmentsBan
      tags:
        - Moderation
      summary: Список банов по всем игрокам и модераторам
      description: Требует право `web.litebans.view.all`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Active"
        - $ref: "#/components/parameters/Silent"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/mod/punishments/mute:
    get:
      operationId: GetModPunishmentsMute
      tags:
        - Moderation
      summary: Список мутов по всем игрокам и модераторам
      description: Требует право `web.litebans.view.all`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Active"
        - $ref: "#/components/parameters/Silent"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/mod/punishments/warning:
    get:
      operationId: GetModPunishmentsWarning
      tags:
        - Moderation
      summary: Список предупреждений по всем игрокам и модераторам
      description: Требует право `web.litebans.view.all`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Active"
        - $ref: "#/components/parameters/Silent"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/mod/punishments/kick:
    get:
      operationId: GetModPunishmentsKick
      tags:
        - Moderation
      summary: Список киков по всем игрокам и модераторам
      description: Требует право `web.litebans.view.all`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlayerUuid"
        - $ref: "#/components/parameters/ModeratorUuid"
        - $ref: "#/components/parameters/Active"
        - $ref: "#/components/parameters/Silent"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/litebans/v1/mod/punishments/{type}/{id}:
    get:
      operationId: GetModPunishmentByID
      tags:
        - Moderation
      summary: Получение одного наказания по типу и id (любое наказание)
      description: Требует право `web.litebans.view.all`. Возвращает запись независимо от её текущей видимости (активна, тиха, неактивна) и владельца.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TypePath"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Punishment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT, выданный Identity Service (RS256). Используется для идентификации игрока.

  parameters:
    TypePath:
      name: type
      in: path
      required: true
      description: Тип наказания.
      schema:
        type: string
        enum: [ban, mute, warning, kick]
    IdPath:
      name: id
      in: path
      required: true
      description: Значение поля `id` объекта `Punishment` — передавать как есть, без преобразований (см. описание схемы `Punishment.id`).
      schema:
        type: string
    Page:
      name: page
      in: query
      description: Номер страницы (с 1). По умолчанию 1.
      schema:
        type: integer
        format: int32
    PageSize:
      name: pageSize
      in: query
      description: Размер страницы. Дефолт и верхний предел задаются конфигурацией сервиса.
      schema:
        type: integer
        format: int32
    Active:
      name: active
      in: query
      description: |
        Переопределяет дефолт видимости активных записей. Дефолт настраивается на
        деплое и может отличаться между средами — если нужно явно показать «все,
        включая снятые», не полагайтесь на него и передавайте параметр явно.
      schema:
        type: boolean
    Silent:
      name: silent
      in: query
      description: |
        Переопределяет дефолт видимости тихих записей. Дефолт настраивается на
        деплое и может отличаться между средами — если нужно явно показать «все,
        включая тихие», не полагайтесь на него и передавайте параметр явно.
      schema:
        type: boolean
    PlayerUuid:
      name: playerUuid
      in: query
      description: Фильтр по игроку.
      schema:
        type: string
    ModeratorUuid:
      name: moderatorUuid
      in: query
      description: Фильтр по модератору (кто выдал наказание).
      schema:
        type: string
    Before:
      name: before
      in: query
      description: Верхняя граница `issuedAt` (исключительно) — вернутся записи, выданные раньше этого момента, unix ms.
      schema:
        type: integer
        format: int64
    After:
      name: after
      in: query
      description: Нижняя граница `issuedAt` (исключительно) — вернутся записи, выданные позже этого момента, unix ms.
      schema:
        type: integer
        format: int64

  schemas:
    Moderator:
      type: object
      required: [isConsole]
      properties:
        uuid:
          type: string
          nullable: true
          description: null, если выдано консолью.
        name:
          type: string
          nullable: true
        isConsole:
          type: boolean

    Player:
      type: object
      required: [isConsole, offlineMode]
      description: Только для `/public/lookup`.
      properties:
        uuid:
          type: string
          nullable: true
          description: null для записей консоли.
        name:
          type: string
          nullable: true
          description: null, если имя не резолвится.
        isConsole:
          type: boolean
        offlineMode:
          type: boolean

    Removed:
      type: object
      required: [by, at, expiredAutomatically]
      description: |
        Присутствует только когда наказание было явно снято модератором/консолью
        (не при автоматическом истечении срока — в этом случае `removed` будет
        `null`, а `expired: true`).
      properties:
        by:
          $ref: "#/components/schemas/Moderator"
        at:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
        expiredAutomatically:
          type: boolean
          description: Всегда `false` в текущей версии API.

    Punishment:
      type: object
      required: [id, type, playerUuid, reason, moderator, issuedAt, serverOrigin]
      description: |
        Наказание одного из четырёх типов: ban / mute / warning / kick. У записей с
        `type: kick` отсутствуют поля длительности и снятия — см. описания полей
        `expiresAt`, `permanent`, `active`, `expired`, `ipBan`, `silent`,
        `serverScope`, `removed`, `acknowledged`. В списках без `{type}` в пути
        (`/player/punishments/me`, `/mod/punishments`) — `items` union всех 4 типов,
        различать по полю `type`.
      properties:
        id:
          description: |
            Идентификатор наказания: число либо (при включённой на сервере
            обфускации id) непрозрачная строка-токен. Токен привязан к конкретному
            `type` — id, полученный для `ban`, нельзя использовать в `mute`.
        type:
          type: string
          enum: [ban, mute, warning, kick]
        playerUuid:
          type: string
          description: Просто строка, без резолвленного имени; для имени использовать `/public/lookup?uuid=...`.
        reason:
          type: string
        moderator:
          $ref: "#/components/schemas/Moderator"
        issuedAt:
          type: integer
          format: int64
        expiresAt:
          type: integer
          format: int64
          nullable: true
          description: Отсутствует, если `permanent === true`. Отсутствует у kick.
        permanent:
          type: boolean
          nullable: true
          description: Отсутствует у kick.
        active:
          type: boolean
          nullable: true
          description: Отсутствует у kick.
        expired:
          type: boolean
          nullable: true
          description: Отсутствует у kick.
        ipBan:
          type: boolean
          nullable: true
          description: Отсутствует у kick.
        silent:
          type: boolean
          nullable: true
          description: Отсутствует у kick.
        serverOrigin:
          type: string
          nullable: true
        serverScope:
          type: string
          nullable: true
          description: Отсутствует у kick.
        removed:
          allOf:
            - $ref: "#/components/schemas/Removed"
          nullable: true
          description: |
            Отсутствует у kick. У остальных типов присутствует только если
            наказание было явно снято. Чтобы понять причину закрытия записи,
            используйте пару `(removed, expired)`: `removed` есть → снято явно;
            `removed` нет и `expired === true` → истекло само; `removed` нет и
            `expired === false` → ещё действует.
        acknowledged:
          type: boolean
          nullable: true
          description: Только для `type === "warning"`. Отсутствует у kick.

    PunishmentList:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Punishment"
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalItems:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32

    Stats:
      type: object
      required: [bans, mutes, warnings, kicks]
      properties:
        bans:
          type: integer
          format: int64
        mutes:
          type: integer
          format: int64
        warnings:
          type: integer
          format: int64
        kicks:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      required: [error, message]
      description: |
        Единый формат ошибки для всех эндпоинтов. `error` — машиночитаемый код:

        | HTTP | `error` | Когда |
        |---|---|---|
        | 400 | `INVALID_UUID` | некорректный формат uuid (не 32/36 hex-символов) |
        | 400 | `INVALID_TYPE` | `{type}` не из набора `ban/mute/warning/kick` |
        | 400 | `INVALID_PARAMETER` | некорректная пагинация, булево значение, имя игрока, или некорректная комбинация параметров `/public/lookup` |
        | 401 | `UNAUTHORIZED` | требуется JWT, но он отсутствует/невалиден/истёк |
        | 403 | `FORBIDDEN` | JWT валиден, но нет права `web.litebans.view.all` |
        | 404 | `NOT_FOUND` | наказание/игрок не найден, либо запись существует, но недоступна вызывающему |
        | 503 | `SERVICE_UNAVAILABLE` | проблема с БД или с Authority Service |
        | 500 | `INTERNAL_ERROR` | непредвиденная ошибка сервиса |
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Доступ запрещён
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Сервис недоступен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
